<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1e1b2e" stroke="#7c6fa0" stroke-width="2"/>
  <!-- Alchemical triangle (upward = fire / spirit) -->
  <polygon points="32,10 50,48 14,48" fill="none" stroke="#c4a35a" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Downward triangle (water / matter) -->
  <polygon points="32,54 14,18 50,18" fill="none" stroke="#7c6fa0" stroke-width="2" stroke-linejoin="round" opacity="0.7"/>
  <!-- Central dot -->
  <circle cx="32" cy="32" r="3" fill="#c4a35a"/>
</svg>
